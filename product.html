<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahsulot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./index.html">
        <img src="./images/logo.jpg" alt="Formachi Logo" class="logo" />
      </a>
    </div>
  </header>

  <section class="product-page">
    <div class="container">
      <a href="./index.html" class="back-link">← Orqaga</a>

      <div id="product-detail" class="product-detail">
        <p>Yuklanmoqda...</p>
      </div>
    </div>
  </section>

  <script src="./product.js"></script>
</body>
</html>
<div id="product-order-modal" class="order-modal">
  <div class="order-modal-content">
    <button id="product-modal-close-btn" class="modal-close-btn">×</button>

    <h2>Mahsulot buyurtma qilish</h2>

    <form id="product-order-form">
      <div class="form-group">
        <label>Mahsulot</label>
        <input type="text" id="product-order-name" readonly />
      </div>

      <div class="form-group">
        <label>Razmer</label>
        <select id="product-order-size" required></select>
      </div>

      <div class="form-group">
        <label>Ismingiz</label>
        <input type="text" id="customer-name" required />
      </div>

      <div class="form-group">
        <label>Telefon</label>
        <input type="text" id="customer-phone" required />
      </div>

      <div class="form-group">
        <label>Soni</label>
        <input type="number" id="product-order-quantity" value="1" min="1" />
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="product-print-toggle" />
          Orqasiga ism/raqam yozdirish
        </label>
      </div>

      <div id="product-print-group" class="form-group hidden">
        <label>Yoziladigan ism yoki raqam</label>
        <input type="text" id="product-print-text" />
      </div>

      <div class="form-group">
        <label>Yetkazib berish manzili</label>
        <textarea id="product-order-address" required></textarea>
      </div>

      <div class="form-group">
        <label>Qo‘shimcha izoh</label>
        <textarea id="product-order-note"></textarea>
      </div>

      <div id="product-form-status" class="form-status"></div>

      <button type="submit" id="product-submit-btn" class="order-btn">
        Buyurtmani yuborish
      </button>
    </form>
  </div>
</div>
